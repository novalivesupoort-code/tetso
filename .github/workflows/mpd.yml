name: Test Streaming

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Start Streaming
        run: |
          while true; do
            ffmpeg -hide_banner -loglevel info \
            -headers "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -headers "Referer: https://mrayham-netfly.hf.space/" \
            -f dash \
            -i 'https://mrayham-netfly.hf.space/stream/1-720p.mpd' \
            -c:v libx264 -preset ultrafast -tune zerolatency -pix_fmt yuv420p \
            -b:v 3000k \
            -vf "fps=30,format=yuv420p" \
            -g 60 -sc_threshold 0 \
            -c:a aac -ar 44100 \
            -f flv "rtmps://dc4-1.rtmp.t.me/s/2469921338:bsK9F5BRae81ZMRCvUZFgA"
            
            echo "فشل الاتصال أو انتهى الملف، إعادة المحاولة..."
            sleep 2
          done
