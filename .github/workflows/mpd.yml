name: Live Stream

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Install FFmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg -qq

      - name: Start Streaming
        run: |
          while true; do
            ffmpeg -hide_banner -loglevel warning \
            -user_agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -headers "Referer: https://mrayham-netfly.hf.space/" \
            -re \
            -err_detect ignore_err \
            -fflags +genpts+discardcorrupt \
            -f dash \
            -i 'https://mrayham-netfly.hf.space/stream/1-720p.mpd' \
            -map 0:v:0 \
            -map 0:a:0 \
            -c:v libx264 \
            -preset ultrafast \
            -tune zerolatency \
            -vf scale=854:480,fps=25,format=yuv420p \
            -b:v 1500k \
            -g 50 \
            -keyint_min 50 \
            -sc_threshold 0 \
            -c:a aac \
            -b:a 96k \
            -ar 44100 \
            -ac 2 \
            -af aresample=async=1000 \
            -f flv \
            "rtmps://dc4-1.rtmp.t.me/s/2469921338:bsK9F5BRae81ZMRCvUZFgA"
            echo "reloading..."
            sleep 3
          done
