name: Final Montertest777

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Start Streaming
        run: |
          while true; do
            ffmpeg -hide_banner -loglevel error \
            -reconnect 1 -reconnect_streamed 1 -reconnect_delay_max 10 \
            -timeout 10000000 \
            -f mpegts \
            -i 'http://cdn.t02m.cc/a/m/953589?' \
            -c:v libx264 -preset veryfast -tune zerolatency -pix_fmt yuv420p \
            -b:v 2500k -maxrate 2500k -bufsize 5000k \
            -vf "fps=30,scale=1280:720,format=yuv420p,drawtext=text='t.me/xl9rr':fontsize=28:fontcolor=white@0.7:x=w-mod(t*90\,(w+tw)):y=h-62" \
            -g 60 -sc_threshold 0 \
            -c:a aac -b:a 100k -ar 44100 \
            -max_muxing_queue_size 1024 \
            -f flv "rtmps://dc4-1.rtmp.t.me/s/2469921338:bsK9F5BRae81ZMRCvUZFgA"
            sleep 5
          done
